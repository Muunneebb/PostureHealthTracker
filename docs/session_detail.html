<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Details - PostureHealthTracker</title>
    
    <!-- Link to your local CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase Libraries (App, Auth, Database, Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* Essential Session Detail Styles */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f4fb;
    margin: 0;
    padding: 20px;
}

.session-detail {
    max-width: 1120px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(19, 38, 74, 0.08);
}

.session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #e5e9f2;
    padding-bottom: 15px;
    margin-bottom: 20px;
}

.session-header h2 { color: #24426f; margin: 0; }
.btn-secondary { background: #e5e9f2; color: #24426f; padding: 10px 15px; text-decoration: none; border-radius: 6px; font-weight: 600; }

.session-overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}

.overview-card {
    background: #f8f9fd;
    border: 1px solid #dce2ef;
    padding: 15px;
    border-radius: 8px;
}

.overview-card h3 { font-size: 0.9rem; color: #5a6d8e; margin: 0 0 5px 0; }
.overview-card .value { font-size: 1.4rem; font-weight: 700; color: #24426f; margin: 0; }

.score-color-good { color: #2f8f46 !important; }
.score-color-medium { color: #996515 !important; }
.score-color-poor { color: #be3f3f !important; }

.readings-section h3 { color: #24426f; margin-bottom: 5px; }
.live-sync-note { color: #48a2f3; font-size: 0.9rem; margin-top: 0; margin-bottom: 15px; font-weight: 600; }

.charts-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}

.readings-table {
    width: 100%;
    border-collapse: collapse;
}

.readings-table th { text-align: left; padding: 10px; border-bottom: 2px solid #e5e9f2; color: #37517d; }
.readings-table td { padding: 10px; border-bottom: 1px solid #e5e9f2; color: #3f5272; }

.badge-yes { color: #2f8f46; font-weight: 700; }
.badge-no { color: #be3f3f; font-weight: 700; }

#loadingState { text-align: center; padding: 40px; color: #5a6d8e; font-size: 1.2rem; }
#contentState { display: none; }
</style>
</head>
<body>

<div class="session-detail">
    <div class="session-header">
        <h2>Session Details</h2>
        <a href="index.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div id="loadingState">Loading session data from Firebase...</div>

    <div id="contentState">
        <div class="session-overview">
            <div class="overview-card">
                <h3>Duration</h3>
                <p class="value" id="detailDuration">-- min</p>
            </div>
            <div class="overview-card">
                <h3>Sitting Time</h3>
                <p class="value" id="detailSittingDuration">-- min</p>
            </div>
            <div class="overview-card">
                <h3>Session Score</h3>
                <p class="value" id="detailSessionScore">--%</p>
            </div>
            <div class="overview-card">
                <h3>Posture Alerts</h3>
                <p class="value" id="detailPostureAlertCount">0</p>
            </div>
        </div>

        <div class="readings-section">
            <h3>Sensor Readings (<span id="readingCountValue">0</span> readings)</h3>
            <p class="live-sync-note" id="liveSyncStatus">Historical data loaded.</p>
            
            <div class="charts-container">
                <div><canvas id="stressChart"></canvas></div>
                <div><canvas id="positionChart"></canvas></div>
            </div>
            
            <table class="readings-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Pitch</th>
                        <th>Roll</th>
                        <th>Sitting</th>
                        <th>Stress</th>
                        <th>Buzzer</th>
                    </tr>
                </thead>
                <tbody id="readingsTableBody">
                    <!-- Javascript will fill this -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ==========================================
// FIREBASE CONFIGURATION
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyDhVpz_D9OTfckaLA792N0c-bqmGnBd7G4",
    authDomain: "posturehealthtracker.firebaseapp.com",
    projectId: "posturehealthtracker",
    storageBucket: "posturehealthtracker.firebasestorage.app",
    messagingSenderId: "330967946233",
    appId: "1:330967946233:web:995732d6b544e67a46e328",
    measurementId: "G-5YG2GL2W9Z"
};

// Initialize Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db = firebase.firestore();

// Chart instances
let stressChart, posChart;
const commonOptions = { responsive: true, tension: 0.4, scales: { y: { beginAtZero: true } } };

// Initialize empty charts
function initCharts() {
    stressChart = new Chart(document.getElementById('stressChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Stress Score (%)', data: [], borderColor: '#FF9800', fill: true }] },
        options: commonOptions
    });

    posChart = new Chart(document.getElementById('positionChart'), {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Pitch', data: [], borderColor: '#2196F3' },
            { label: 'Roll', data: [], borderColor: '#4CAF50' }
        ]},
        options: commonOptions
    });
}

function renderReadingRow(r, timestamp) {
    const row = document.createElement('tr');
    const timeStr = timestamp.toDate().toLocaleTimeString();
    
    // Safety checks for Muneeb's mock data structure
    const pitch = r.pitch ? r.pitch.toFixed(1) : '-';
    const roll = r.roll ? r.roll.toFixed(1) : '-';
    const stress = r.stress_score ? (r.stress_score * 100).toFixed(0) + '%' : '-';
    
    row.innerHTML = `
        <td>${timeStr}</td>
        <td>${pitch}°</td>
        <td>${roll}°</td>
        <td>${r.fsr > 100 ? '<span class="badge-yes">Yes</span>' : '<span class="badge-no">No</span>'}</td>
        <td>${stress}</td>
        <td>${r.buzzer > 0 ? '<span class="badge-yes">Yes</span>' : '<span class="badge-no">No</span>'}</td>
    `;
    return row;
}

// 1. Get Session ID from URL (e.g. session_detail.html?id=ABCDEFG)
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('id');

auth.onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = 'login.html'; // Must be logged in
        return;
    }

    if (!sessionId) {
        document.getElementById('loadingState').innerText = "No session ID provided.";
        return;
    }

    initCharts();

    try {
        // Fetch session data from Firestore
        const sessionDoc = await db.collection('sessions').doc(sessionId).get();
        
        if (sessionDoc.exists) {
            const data = sessionDoc.data();
            
            // Show content, hide loading
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('contentState').style.display = 'block';

            // Populate Top Cards
            document.getElementById('detailDuration').innerText = Math.round(data.duration / 60) + " min";
            document.getElementById('detailSittingDuration').innerText = Math.round(data.sitDuration / 60) + " min";
            
            const scorePct = Math.round((data.sessionScore || 0) * 100);
            const scoreEl = document.getElementById('detailSessionScore');
            scoreEl.innerText = scorePct + "%";
            if (scorePct >= 70) scoreEl.classList.add('score-color-good');
            else if (scorePct >= 40) scoreEl.classList.add('score-color-medium');
            else scoreEl.classList.add('score-color-poor');

            document.getElementById('detailPostureAlertCount').innerText = data.buzzerCount || 0;

            // Fetch Readings for Charts/Tables
            const readingsSnapshot = await db.collection('sessions').doc(sessionId).collection('readings').orderBy('timestamp').get();
            const readingsBody = document.getElementById('readingsTableBody');
            
            document.getElementById('readingCountValue').innerText = readingsSnapshot.size;

            readingsSnapshot.forEach(doc => {
                const r = doc.data();
                const timeStr = r.timestamp.toDate().toLocaleTimeString();
                
                // Add to table
                readingsBody.appendChild(renderReadingRow(r, r.timestamp));
                
                // Add to charts
                stressChart.data.labels.push(timeStr);
                stressChart.data.datasets[0].data.push((r.stress_score || 0) * 100);
                
                posChart.data.labels.push(timeStr);
                posChart.data.datasets[0].data.push(r.pitch || 0);
                posChart.data.datasets[1].data.push(r.roll || 0);
            });

            stressChart.update();
            posChart.update();

        } else {
            document.getElementById('loadingState').innerText = "Session not found.";
        }
    } catch (error) {
        console.error("Error fetching session:", error);
        document.getElementById('loadingState').innerText = "Error loading session data.";
    }
});
</script>

</body>
</html>
