<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PostureHealthTracker</title>
    
    <!-- Link to your local CSS (fallback styles below just in case) -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Include Firebase Libraries for Authentication -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        /* Essential styles for the login page to replace base.html */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-form {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(19, 38, 74, 0.08);
            border: 1px solid #dce2ef;
        }

        .auth-form h2 {
            margin-top: 0;
            color: #24426f;
            text-align: center;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #5a6d8e;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #37517d;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cad3e5;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #48a2f3;
            box-shadow: 0 0 0 3px rgba(72, 162, 243, 0.15);
        }

        .btn-primary {
            width: 100%;
            background: #48a2f3;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #368be0;
        }

        .error-message {
            color: #be3f3f;
            background: #fde8e8;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #5a6d8e;
        }

        .auth-footer a {
            color: #48a2f3;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-form">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your PostureHealthTracker account</p>

        <!-- Removed the <form> action, relying purely on JavaScript now -->
        <div id="loginForm">
            <div class="form-group">
                <!-- Changed to Email for Firebase standard -->
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <button type="button" onclick="handleLogin()" class="btn btn-primary btn-block">Sign In</button>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
        </div>

        <div class="auth-footer">
            <!-- Updated the Flask url_for tag to standard HTML linking -->
            <p>Don't have an account? <a href="register.html">Create one here</a></p>
        </div>
    </div>
</div>

<script>
// ==========================================
// FIREBASE CONFIGURATION
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyDhVpz_D9OTfckaLA792N0c-bqmGnBd7G4",
    authDomain: "posturehealthtracker.firebaseapp.com",
    projectId: "posturehealthtracker",
    storageBucket: "posturehealthtracker.firebasestorage.app",
    messagingSenderId: "330967946233",
    appId: "1:330967946233:web:995732d6b544e67a46e328",
    measurementId: "G-5YG2GL2W9Z"
};

// Initialize Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

// Check if user is already logged in, redirect to dashboard if true
auth.onAuthStateChanged(user => {
    if (user) {
        window.location.href = 'index.html';
    }
});

// The Login Logic
function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');

    // Reset error message
    errorDiv.style.display = 'none';

    if (!email || !password) {
        errorDiv.textContent = 'Please fill in both fields.';
        errorDiv.style.display = 'block';
        return;
    }

    // Authenticate with Firebase directly
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            // Success! Redirect to the main dashboard
            window.location.href = 'index.html';
        })
        .catch((error) => {
            // Display Firebase error (e.g., wrong password, user not found)
            errorDiv.textContent = error.message;
            errorDiv.style.display = 'block';
        });
}
</script>

</body>
</html>
